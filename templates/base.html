{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Надёжный дом{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}">

    <style>
        :root {
            --primary-color: #1a365d;
            --secondary-color: #007bff;
            --accent-color: #ff6b35;
            --transition: all 0.3s ease;
        }

        /* Боковое меню */
        .sidebar {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100vh;
            background: linear-gradient(180deg, var(--primary-color) 0%, #0d1f3d 100%);
            color: white;
            z-index: 1050;
            transition: var(--transition);
            box-shadow: 5px 0 25px rgba(0,0,0,0.3);
            overflow-y: auto;
        }
        .sidebar.active { left: 0; }
        .sidebar-header {
            padding: 30px 25px;
            text-align: center;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 1.8em; font-weight: bold; margin-bottom: 10px; }
        .logo-subtitle { opacity: 0.8; font-size: 0.9em; }
        .sidebar-menu { list-style: none; padding: 20px 0; }
        .sidebar-menu li { margin: 5px 15px; }
        .sidebar-menu a {
            display: flex; align-items: center;
            padding: 15px 20px; color: white; text-decoration: none;
            border-radius: 10px; transition: var(--transition); font-weight: 500;
        }
        .sidebar-menu a:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .sidebar-menu a.active { background: var(--secondary-color); box-shadow: 0 4px 15px rgba(0,123,255,0.4); }
        .sidebar-menu a i { font-size: 1.3em; margin-right: 15px; }
        .cart-badge {
            background: var(--accent-color); color: white; border-radius: 50%;
            width: 22px; height: 22px; font-size: 0.75em; font-weight: bold;
            display: inline-flex; align-items: center; justify-content: center;
            margin-left: auto;
        }

        /* Overlay */
        .overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1040; display: none;
        }
        .overlay.active { display: block; }

        /* Кнопка меню */
        .menu-toggle {
            position: fixed; top: 20px; left: 20px; z-index: 1045;
            background: var(--secondary-color); color: white;
            border: none; width: 50px; height: 50px;
            border-radius: 50%; font-size: 1.3em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: var(--transition); cursor: pointer;
        }
        .menu-toggle:hover { background: var(--accent-color); transform: scale(1.1); }

        /* Back to Top */
        .back-to-top {
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px;
            background: var(--secondary-color); color: white;
            border: none; border-radius: 50%; font-size: 1.5em;
            box-shadow: 0 4px 20px rgba(0,123,255,0.3);
            z-index: 999; transition: var(--transition);
            opacity: 0; visibility: hidden; cursor: pointer;
        }
        .back-to-top.show { opacity: 1; visibility: visible; }
        .back-to-top:hover { background: var(--accent-color); transform: translateY(-5px) scale(1.1); }

        /* Footer */
        footer { background: var(--primary-color); color: white; padding: 30px 0; margin-top: 50px; }
        .social-link {
            display: inline-block; width: 40px; height: 40px;
            border-radius: 50%; overflow: hidden; transition: var(--transition);
        }
        .social-link:hover { transform: scale(1.2); }
        .social-link img { width: 100%; height: 100%; object-fit: cover; }

        /* Section Title */
        .section-title { position: relative; display: inline-block; margin-bottom: 30px; }
        .section-title::after {
            content: ''; display: block; width: 80px; height: 4px;
            background: var(--accent-color); margin: 15px auto; border-radius: 2px;
        }

        /* Promo Banner */
        .promo-banner {
            background: linear-gradient(45deg, #ff6b35, #ff8e53);
            color: white; padding: 40px; border-radius: 15px;
            text-align: center; position: relative; overflow: hidden;
        }
        .promo-button {
            background: white; color: var(--accent-color);
            padding: 12px 30px; border-radius: 25px;
            text-decoration: none; font-weight: bold;
            transition: var(--transition); display: inline-block;
        }
        .promo-button:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    {% include "includes/header.html" %}

    {% block content %}{% endblock %}

    {% include "includes/footer.html" %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Управление меню
        const sidebar    = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menuToggle');
        const overlay    = document.getElementById('overlay');
        function toggleMenu() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }
        if (menuToggle) menuToggle.addEventListener('click', toggleMenu);
        if (overlay) overlay.addEventListener('click', toggleMenu);
        document.querySelectorAll('.sidebar-menu a').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 768) toggleMenu();
            });
        });

        // Кнопка «Наверх»
        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            if (backToTop) backToTop.classList.toggle('show', window.pageYOffset > 300);
        });
        if (backToTop) backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

        // Счётчик корзины
        (function() {
            const cart  = JSON.parse(localStorage.getItem('nd_cart') || '[]');
            const badge = document.getElementById('cartBadgeMenu');
            if (badge) badge.textContent = cart.length;
        })();
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
